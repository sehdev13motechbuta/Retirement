<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retirement Invitation | Mr. Ashok Verma</title>
<!-- Elegant & Professional Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --police-blue: #1a3a5f;
  --light-blue: #e3f2fd;
  --accent-blue: #2196f3;
  --silver: #bdc3c7;
  --white: #ffffff;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  color: #333;
}

/* Background Pattern */
.bg-pattern {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(var(--accent-blue) 0.5px, transparent 0.5px);
  background-size: 30px 30px;
  opacity: 0.1;
  z-index: 0;
}

.card {
  width: 90vw;
  max-width: 420px;
  background: var(--white);
  border-top: 8px solid var(--police-blue);
  border-radius: 15px;
  padding: 40px 20px;
  text-align: center;
  position: relative;
  z-index: 10;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.card-inner {
  border: 1px solid #eee;
  padding: 30px 20px;
  border-radius: 10px;
}

h1 {
  font-family: 'Playfair Display', serif;
  color: var(--police-blue);
  font-size: 26px;
  margin-top: 15px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

p {
  font-size: 16px;
  line-height: 1.6;
  color: #555;
  min-height: 60px;
  transition: opacity 0.5s;
}

/* Inspector Cap Icon */
.cap-icon {
  width: 60px;
  height: auto;
  position: absolute;
  top: -35px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.photo-box {
  position: relative;
  display: inline-block;
  margin-bottom: 20px;
  margin-top: 20px;
}

.photo {
  width: 150px;
  height: 150px;
  border-radius: 10px; /* Changed from circle to soft square */ 
  border: 4px solid var(--white);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Animations */
.fade-out { opacity: 0; transform: translateY(10px); }
.fade-in { opacity: 1; transform: translateY(0); transition: 0.5s; }

.btn-container {
  margin-top: 25px;
}

button {
  padding: 12px 28px;
  border: none;
  border-radius: 5px;
  background: var(--police-blue);
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin: 5px;
  font-size: 14px;
  text-transform: uppercase;
  transition: all 0.3s;
}

button:hover {
  background: var(--accent-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
}

.location-btn {
  background: transparent;
  border: 1.5px solid var(--police-blue);
  color: var(--police-blue);
}

.location-btn:hover {
  background: var(--light-blue);
  color: var(--police-blue);
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 5;
}

.badge-seal {
    font-size: 12px;
    color: var(--accent-blue);
    font-weight: bold;
    display: block;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="bg-pattern"></div>
<canvas id="fireworks"></canvas>

<!-- Subtle professional background music -->
<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a7315b.mp3" loop></audio>

<div class="card">
  <div class="photo-box">
    
    
    </svg>
    
    <img class="photo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPs03wdOM_auxjT0zsu-983uAmdoj_r4TePw&s" alt="Mr Ashok Verma">
    <span class="badge-seal">HONOR • SERVICE • INTEGRITY</span>
  </div>

  <div class="card-inner">
    <div id="content-area">
        <h1 id="title">Distinguished Service</h1>
        <p id="text">Celebrating the honorable career and retirement of <br><strong>Mr. Ashok Verma</strong></p>
    </div>

    <div class="btn-container">
      <button onclick="nextPage()">View Invitation ✨</button>
      <br>
      <a href="https://maps.app.goo.gl/w1xFt3GhAfGgwEnv6" target="_blank">
        <button class="location-btn">📍 The Venue</button>
      </a>
    </div>
  </div>
</div>

<script>
let page = 0;
const pages = [
  {title: "Distinguished Service", text: "Celebrating the honorable career and retirement of <br><strong>Mr. Ashok Verma</strong>"},
  {title: "The Hosts", text: "Warmly invited by:<br>Sangeeta, Sehdev, Chetna & Saachi"},
  {title: "Date & Time", text: "Saturday, 02 MAY 2026 <br> 7:00 PM Onwards"},
  {title: "The Venue", text: "ABS Banquet Hall<br>SCO 958 Sector 70, Mohali"},
  {title: "A New Chapter", text: "Please join us for an evening of <br>Music, Dinner, and Fond Memories!"}
];

function nextPage() {
  const music = document.getElementById("music");
  if(music.paused) music.play().catch(e => console.log("Music blocked until user interacts"));

  launchBlueFireworks();

  const container = document.getElementById("content-area");
  container.classList.add("fade-out");

  setTimeout(() => {
    page = (page + 1) % pages.length;
    document.getElementById("title").innerHTML = pages[page].title;
    document.getElementById("text").innerHTML = pages[page].text;
    container.classList.remove("fade-out");
    container.classList.add("fade-in");
  }, 400);
}

// Fireworks Logic adjusted for Blue/White theme
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.velocity = {
      x: (Math.random() - 0.5) * 6,
      y: (Math.random() - 0.5) * 6
    };
    this.alpha = 1;
    this.friction = 0.97;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }

  update() {
    this.velocity.x *= this.friction;
    this.velocity.y *= this.friction;
    this.x += this.velocity.x;
    this.y += this.velocity.y;
    this.alpha -= 0.015;
  }
}

function launchBlueFireworks() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * (canvas.height / 2);
  
  // Police Blue and Light Blue colors
  const colors = ['#1a3a5f', '#2196f3', '#e3f2fd', '#ffffff'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  
  for (let i = 0; i < 30; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach((p, index) => {
    if (p.alpha > 0) {
      p.update();
      p.draw();
    } else {
      particles.splice(index, 1);
    }
  });
  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
