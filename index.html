<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Retirement Invitation | Mr. Ashok Verma</title>
<!-- Elegant Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-card: #fdfaf3; 
  --text-dark: #2c2c2c;
  --accent-gold: #b08d57;
  --text-muted: #666;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  color: var(--text-dark);
}

/* The Card Container */
.card {
  position: relative;
  width: 95%;
  max-width: 400px;
  height: 650px;
  background-color: var(--bg-card);
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 30px;
  border-radius: 8px;
}

/* Elegant Botanical SVG Decorations */
.floral {
  position: absolute;
  width: 200px;
  height: 200px;
  z-index: 1;
  pointer-events: none;
}

.floral-top-right {
  top: -30px;
  right: -30px;
}

.floral-bottom-left {
  bottom: -30px;
  left: -30px;
  transform: rotate(180deg);
}

/* Content Area */
.content {
  position: relative;
  z-index: 10;
  width: 100%;
}

.happy-label {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--accent-gold);
  margin-bottom: 0;
  font-weight: 700;
}

.retirement-label {
  font-family: 'Dancing Script', cursive;
  font-size: 64px;
  color: var(--text-dark);
  margin-top: -12px;
  margin-bottom: 35px;
}

#message-area {
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.main-text {
  font-size: 18px;
  line-height: 1.6;
  color: var(--text-muted);
  font-weight: 300;
}

.main-text strong {
    color: var(--text-dark);
    font-weight: 600;
}

/* Buttons Container */
.btn-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 40px;
    width: 100%;
}

.btn {
  background: transparent;
  border: 1px solid var(--text-dark);
  padding: 12px 20px;
  color: var(--text-dark);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  font-weight: 600;
  border-radius: 4px;
}

.btn:hover {
  background: var(--text-dark);
  color: white;
}

.btn-map {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
    background: rgba(176, 141, 87, 0.05);
}

.btn-map:hover {
    background: var(--accent-gold);
    color: white;
    border-color: var(--accent-gold);
}

/* Smooth Fade Animation */
.fade { transition: 0.4s opacity, 0.4s transform; }
.fade-out { opacity: 0; transform: translateY(10px); }

</style>
</head>
<body>

<div class="card">
  <!-- Top Right Floral Decoration -->
  <svg class="floral floral-top-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path fill="#b08d57" fill-opacity="0.2" d="M100 0C120 40 180 20 200 60C180 100 200 160 160 180C120 200 40 180 20 140C0 100 40 80 100 0Z"/>
    <path fill="#8d6e63" fill-opacity="0.3" d="M150 20Q180 50 150 80T120 20Z"/>
    <circle fill="#b08d57" fill-opacity="0.4" cx="170" cy="50" r="15"/>
    <circle fill="#b08d57" fill-opacity="0.2" cx="130" cy="30" r="25"/>
  </svg>

  <!-- Bottom Left Floral Decoration -->
  <svg class="floral floral-bottom-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path fill="#b08d57" fill-opacity="0.2" d="M100 0C120 40 180 20 200 60C180 100 200 160 160 180C120 200 40 180 20 140C0 100 40 80 100 0Z"/>
    <path fill="#8d6e63" fill-opacity="0.3" d="M150 20Q180 50 150 80T120 20Z"/>
  </svg>

  <div class="content">
    <div class="happy-label">Happy</div>
    <div class="retirement-label">Retirement</div>

    <div id="message-area">
      <p id="text" class="main-text fade">
        Celebrating the honorable career and retirement of <strong>Mr. Ashok Verma.</strong>
      </p>
    </div>

    <div class="btn-container">
        <button class="btn" onclick="nextPage()">Next Detail</button>
        <a href="https://www.google.com/maps/search/?api=1&query=ABS+Banquet+Hall+SCO+958+Sector+70+Mohali" 
           target="_blank" 
           class="btn btn-map">📍 The Venue</a>
    </div>
  </div>
</div>

<script>
let page = 0;
const pages = [
  { text: "Celebrating the honorable career and retirement of.<br><br><strong>Mr. Ashok Verma</strong>" },
  { text: "Warmly invited by:<br><strong>Verma Family</strong>" },
  { text: "Celebrating on:<br><strong>Saturday, 02 MAY 2026</strong><br><strong>7:00 PM Onwards</strong>" },
  { text: "<strong>The Venue:</strong><br>ABS Banquet Hall<br>SCO 958 Sector 70, Mohali" },
  { text: "Please join us for an evening of :- <strong><br>Music, Dinner, and Fond Memories!" }
 
];

function nextPage() {
  const textElement = document.getElementById("text");
  
  // Add fade out
  textElement.classList.add("fade-out");

  setTimeout(() => {
    // Update content
    page = (page + 1) % pages.length;
    textElement.innerHTML = pages[page].text;
    
    // Remove fade out to trigger fade in
    textElement.classList.remove("fade-out");
  }, 400);
}
</script>

</body>
</html>
