<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Retirement Invitation | Mr. Ashok Verma</title>
<!-- Elegant & Professional Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --police-blue: #1a3a5f;
  --light-blue: #e3f2fd;
  --accent-blue: #2196f3;
  --white: #ffffff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: var(--police-blue);
}

/* Background Pattern */
.bg-pattern {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(var(--accent-blue) 0.5px, transparent 0.5px);
  background-size: 30px 30px;
  opacity: 0.15;
  z-index: 0;
}

.card {
  width: 100%;
  height: 100%;
  max-width: 500px; /* Limits width on large tablets/desktops for readability */
  background: var(--white);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 10;
  box-shadow: 0 0 50px rgba(0,0,0,0.3);
}

/* Blue Header Section - Upper Blue on all sides */
.card-header {
  background: var(--police-blue);
  flex: 0 0 40%; /* Takes up 40% of the screen height */
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 50px;
  position: relative;
  border-bottom: 5px solid var(--accent-blue);
}

.card-body {
  flex: 1;
  padding: 30px 20px;
  background: white;
  margin-top: -30px;
  border-radius: 30px 30px 0 0;
  position: relative;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Inspector Cap SVG */
.cap-icon {
  width: 100px;
  position: absolute;
  top: -85px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

.photo-box {
  position: relative;
  display: inline-block;
}

.photo {
  width: 180px;
  height: 180px;
  border-radius: 20px;
  object-fit: cover;
  border: 6px solid var(--white);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
  font-family: 'Playfair Display', serif;
  color: var(--police-blue);
  font-size: clamp(22px, 6vw, 28px);
  margin: 10px 0;
  text-transform: uppercase;
  letter-spacing: 1px;
}

p {
  font-size: clamp(15px, 4vw, 17px);
  line-height: 1.6;
  color: #444;
  min-height: 80px;
  margin: 0 auto;
}

.badge-seal {
    font-size: 12px;
    color: var(--accent-blue);
    font-weight: 600;
    letter-spacing: 3px;
    display: block;
    margin-bottom: 10px;
}

.btn-container {
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

button {
  width: 90%;
  max-width: 300px;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: var(--police-blue);
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin: 8px auto;
  font-size: 14px;
  text-transform: uppercase;
  transition: all 0.3s;
  display: block;
  box-shadow: 0 4px 10px rgba(26, 58, 95, 0.3);
}

button:active {
  transform: scale(0.95);
}

.location-btn {
  background: white;
  border: 2px solid var(--police-blue);
  color: var(--police-blue);
}

/* Animations */
.fade-out { opacity: 0; transform: translateY(15px); transition: 0.4s; }
.fade-in { opacity: 1; transform: translateY(0); transition: 0.4s; }

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 5;
}

/* Tablet sizing adjustment */
@media (min-width: 768px) {
  .card {
    height: 90vh;
    border-radius: 25px;
    border: 3px solid var(--police-blue);
  }
}
</style>
</head>
<body>

<div class="bg-pattern"></div>
<canvas id="fireworks"></canvas>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a7315b.mp3" loop></audio>

<div class="card">
  <!-- Solid Blue Upper Section -->
  <div class="card-header">
    <div class="photo-box">
      <!-- Inspector Cap -->
      <svg class="cap-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <path fill="#1a3a5f" d="M495.9 336.1c-12.7-53.1-60.7-94.6-114-110.1l-102.3-30c-15.1-4.4-31.1-4.4-46.2 0l-102.3 30c-53.3 15.5-101.3 57-114 110.1L0 411.3v20.7c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32v-20.7l-16.1-75.2z"/>
          <path fill="#2196f3" d="M256 176c-10.3 0-20.5 1.1-30.4 3.2L32 239.3v13.6c0 10 6.1 18.9 15.3 22.5l194.2 75.3c9.3 3.6 19.7 3.6 29 0l194.2-75.3c9.2-3.6 15.3-12.5 15.3-22.5v-13.6L286.4 179.2c-9.9-2.1-20.1-3.2-30.4-3.2z"/>
          <circle fill="#FFD700" cx="256" cy="240" r="20"/>
      </svg>
      <img class="photo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPs03wdOM_auxjT0zsu-983uAmdoj_r4TePw&s" alt="Mr Ashok Verma">
    </div>
  </div>

  <div class="card-body">
    <div>
        <span class="badge-seal">HONOR • SERVICE • INTEGRITY</span>
        <div id="content-area">
            <h1 id="title">Distinguished Service</h1>
            <p id="text">Celebrating the honorable career and retirement of <br><strong>Mr. Ashok Verma</strong></p>
        </div>
    </div>

    <div class="btn-container">
      <button onclick="nextPage()">View Details ✨</button>
      <a href="https://maps.app.goo.gl/w1xFt3GhAfGgwEnv6" target="_blank" style="text-decoration: none;">
        <button class="location-btn">📍 The Venue</button>
      </a>
    </div>
  </div>
</div>

<script>
let page = 0;
const pages = [
  {title: "Distinguished Service", text: "Celebrating the honorable career and retirement of <br><strong>Mr. Ashok Verma</strong>"},
  {title: "The Hosts", text: "Warmly invited by:<br>Sangeeta, Sehdev, Chetna & Saachi"},
  {title: "Date & Time", text: "Saturday, 02 MAY 2026 <br> 7:00 PM Onwards"},
  {title: "The Venue", text: "ABS Banquet Hall<br>SCO 958 Sector 70, Mohali"},
  {title: "A New Chapter", text: "Please join us for an evening of <br>Music, Dinner, and Fond Memories!"}
];

function nextPage() {
  const music = document.getElementById("music");
  if(music.paused) music.play().catch(e => {});

  launchBlueFireworks();

  const container = document.getElementById("content-area");
  container.classList.add("fade-out");

  setTimeout(() => {
    page = (page + 1) % pages.length;
    document.getElementById("title").innerHTML = pages[page].title;
    document.getElementById("text").innerHTML = pages[page].text;
    container.classList.remove("fade-out");
    container.classList.add("fade-in");
  }, 400);
}

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    this.velocity = { x: (Math.random() - 0.5) * 6, y: (Math.random() - 0.5) * 6 };
    this.alpha = 1;
    this.friction = 0.97;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
  update() {
    this.velocity.x *= this.friction;
    this.velocity.y *= this.friction;
    this.x += this.velocity.x;
    this.y += this.velocity.y;
    this.alpha -= 0.015;
  }
}

function launchBlueFireworks() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * (canvas.height / 2);
  const colors = ['#1a3a5f', '#2196f3', '#ffffff'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  for (let i = 0; i < 35; i++) particles.push(new Particle(x, y, color));
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, index) => {
    if (p.alpha > 0) { p.update(); p.draw(); }
    else { particles.splice(index, 1); }
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
