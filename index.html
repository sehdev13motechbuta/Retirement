<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golden Retirement Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#3b2f00,#000);
  color:#fff;
}

.card{
  width:90vw;
  max-width:380px;
  background:linear-gradient(145deg,#d4af37,#f7e27d,#c9a227);
  border-radius:25px;
  padding:20px;
  text-align:center;
  color:#3b2f00;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
  position:relative;
}

h1{margin-bottom:10px;font-size:20px}
p{font-size:15px;margin-bottom:12px}

button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  cursor:pointer;
  margin:5px;
  font-size:14px;
}

.photo-box{
  position:relative;
  display:inline-block;
}

.photo{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #fff;
}

.name-tag{
  position:absolute;
  bottom:-8px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:2px 8px;
  border-radius:8px;
  font-size:11px;
}

.disco{
  width:35px;
  height:35px;
  background:silver;
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 0 15px #fff,0 0 30px #fff;
  animation:spin 3s linear infinite;
}

@keyframes spin{
  from{transform:translateX(-50%) rotate(0deg)}
  to{transform:translateX(-50%) rotate(360deg)}
}

.lights{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  background:linear-gradient(120deg,transparent,rgba(255,0,200,.3),transparent);
  animation:lights 4s linear infinite;
}

@keyframes lights{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

.dance{
  font-size:40px;
  animation:dance 1s infinite alternate ease-in-out;
}

@keyframes dance{
  from{transform:translateY(0) rotate(-10deg)}
  to{transform:translateY(-12px) rotate(10deg)}
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}

</style>
</head>
<body>

<div class="lights"></div>
<canvas id="fireworks"></canvas>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/10/25/audio_946b9c3a4a.mp3"></audio>

<div class="card">
  <div class="disco"></div>

  <div class="photo-box">
    <img class="photo" src="https://i.imgur.com/4Z7AzH0.png" alt="Mr Ashok Verma">
    
  <div class="dance">👨‍🦳🕺</div>
  </div>


  <h1 id="title">Golden Retirement Celebration</h1>
  <p id="text">You are invited to celebrate the retirement of Mr. Ashok Verma</p>

  <button onclick="nextPage()">Next</button>

  <br><br>

  <a href="https://maps.app.goo.gl/w1xFt3GhAfGgwEnv6" target="_blank">
    <button>🗺 Location</button>
  </a>
</div>

<script>
let page=0;

const pages=[
{title:"🏆 Golden Retirement",text:"Join us in celebrating the wonderful career of Mr. Ashok Verma"},
{title:"👨‍👩‍👧‍👦 Hosted By",text:"Family: Sangeeta, Sehdev, Chetna, Saachi"},
{title:"📅 Event Details",text:"02 MAY 2026 | 7:00 PM"},
{title:"📍 Venue",text:"ABS Banquet Hall - SCO 958 Sector 70"},
{title:"🎉 Celebration",text:"Music, Dance and Celebration!"}
];

function nextPage(){
 document.getElementById("music").play();
 launchFireworks();

 page++;
 if(page>=pages.length){page=0;}

 document.getElementById("title").innerText=pages[page].title;
 document.getElementById("text").innerText=pages[page].text;
}

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function launchFireworks(){
 for(let i=0;i<60;i++){
  particles.push({
   x:canvas.width/2,
   y:canvas.height/2,
   angle:Math.random()*Math.PI*2,
   speed:2+Math.random()*3,
   radius:2+Math.random()*2
  });
 }
}

function update(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 particles.forEach(p=>{
  p.x+=Math.cos(p.angle)*p.speed;
  p.y+=Math.sin(p.angle)*p.speed;

  ctx.beginPath();
  ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
  ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
  ctx.fill();
 });

 requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
