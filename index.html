<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Retirement Invitation | Mr. Ashok Verma</title>
<!-- Elegant Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-card: #fdfaf3; 
  --text-dark: #2c2c2c;
  --accent-gold: #b08d57;
  --text-muted: #666;
  --shadow: 0 20px 60px rgba(0,0,0,0.15);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: #e8e8e8;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  color: var(--text-dark);
}

/* The Card Container - Responsive Sizing */
.card {
  position: relative;
  width: 92%;
  max-width: 420px;
  /* Adjusts height based on screen size but keeps minimums */
  min-height: 600px;
  max-height: 95vh;
  background-color: var(--bg-card);
  box-shadow: var(--shadow);
  overflow-y: auto; /* Allows scrolling if content is long on tiny screens */
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  padding: 2.5rem 1.5rem;
  border-radius: 12px;
  transition: transform 0.3s ease;
}

/* Custom Scrollbar for the card */
.card::-webkit-scrollbar { width: 4px; }
.card::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

/* Responsive Botanical SVG Decorations */
.floral {
  position: absolute;
  width: clamp(120px, 40vw, 200px);
  height: auto;
  z-index: 1;
  pointer-events: none;
  opacity: 0.7;
}

.floral-top-right {
  top: -20px;
  right: -20px;
}

.floral-bottom-left {
  bottom: -20px;
  left: -20px;
  transform: rotate(180deg);
}

/* Content Area */
.content {
  position: relative;
  z-index: 10;
  width: 100%;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.happy-label {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 4vw, 1.4rem);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--accent-gold);
  margin-bottom: 0;
  font-weight: 700;
}

.retirement-label {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(3rem, 12vw, 4rem);
  color: var(--text-dark);
  margin-top: -10px;
  margin-bottom: 2rem;
}

#message-area {
  min-height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
}

.main-text {
  font-size: clamp(1rem, 3.5vw, 1.15rem);
  line-height: 1.6;
  color: var(--text-muted);
  font-weight: 300;
}

.main-text strong {
    color: var(--text-dark);
    font-weight: 600;
}

/* Buttons Container */
.btn-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 280px;
    margin: 0 auto;
}

.btn {
  background: transparent;
  border: 1.5px solid var(--text-dark);
  padding: 14px 20px;
  color: var(--text-dark);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  font-weight: 600;
  border-radius: 6px;
  display: inline-block;
}

.btn:active { transform: scale(0.98); }

.btn:hover {
  background: var(--text-dark);
  color: white;
}

.btn-map {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
    background: rgba(176, 141, 87, 0.05);
}

.btn-map:hover {
    background: var(--accent-gold);
    color: white;
}

/* Smooth Fade Animation */
.fade { transition: 0.4s opacity, 0.4s transform; }
.fade-out { opacity: 0; transform: translateY(10px); }

/* Landscape mode adjustments for mobile */
@media (max-height: 500px) {
    .card { min-height: 90vh; padding: 1rem; }
    .retirement-label { margin-bottom: 0.5rem; font-size: 2.5rem; }
    .btn-container { flex-direction: row; max-width: 100%; }
}

</style>
</head>
<body>

<div class="card">
  <!-- Top Right Floral Decoration -->
  <svg class="floral floral-top-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path fill="#b08d57" fill-opacity="0.2" d="M100 0C120 40 180 20 200 60C180 100 200 160 160 180C120 200 40 180 20 140C0 100 40 80 100 0Z"/>
    <circle fill="#b08d57" fill-opacity="0.3" cx="170" cy="50" r="15"/>
    <circle fill="#b08d57" fill-opacity="0.1" cx="130" cy="30" r="25"/>
  </svg>

  <!-- Bottom Left Floral Decoration -->
  <svg class="floral floral-bottom-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path fill="#b08d57" fill-opacity="0.2" d="M100 0C120 40 180 20 200 60C180 100 200 160 160 180C120 200 40 180 20 140C0 100 40 80 100 0Z"/>
  </svg>

  <div class="content">
    <div class="happy-label">Happy</div>
    <div class="retirement-label">Retirement</div>

    <div id="message-area">
      <p id="text" class="main-text fade">
        Celebrating the honorable career and retirement of <strong>Mr. Ashok Verma.</strong>
      </p>
    </div>
  </div>

  <div class="btn-container">
    <button class="btn" onclick="nextPage()">Next Detail</button>
    <a href="https://www.google.com/maps/search/?api=1&query=ABS+Banquet+Hall+SCO+958+Sector+70+Mohali" 
       target="_blank" 
       class="btn btn-map">📍 The Venue</a>
  </div>
</div>

<script>
let page = 0;
const pages = [
  { text: "Celebrating the honorable career and retirement of:<br><br><strong>Mr. Ashok Verma</strong>" },
  { text: "Warmly invited by:<br><strong>Verma Family</strong>" },
  { text: "Celebrating on:<br><strong>Saturday, 02 MAY 2026</strong><br><strong>7:00 PM Onwards</strong>" },
  { text: "<strong>The Venue:</strong><br>ABS Banquet Hall<br>SCO 958 Sector 70, Mohali" },
  { text: "Please join us for an evening of:<br><strong>Music, Dinner, and Fond Memories!</strong>" }
];

function nextPage() {
  const textElement = document.getElementById("text");
  
  // Add fade out
  textElement.classList.add("fade-out");

  setTimeout(() => {
    // Update content
    page = (page + 1) % pages.length;
    textElement.innerHTML = pages[page].text;
    
    // Remove fade out to trigger fade in
    textElement.classList.remove("fade-out");
  }, 400);
}
</script>

</body>
</html>
